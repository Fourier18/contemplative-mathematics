<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}{% if page.description %} | {{ page.description }}{% endif %}</title>
  {% if page.description %}<meta name="description" content="{{ page.description }}">{% endif %}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}?v={{ site.time | date: '%s' }}">
</head>
<body>
  <header class="banner">
    <div class="banner-inner">
      <h1 class="banner-title">{{ page.title | default: site.title }}</h1>
      {% if page.description %}<p class="banner-tagline">{{ page.description }}</p>{% endif %}
    </div>
  </header>
  <main class="main-content">
    <div class="content-inner">
      {{ content }}
    </div>
  </main>
</body>
</html>
